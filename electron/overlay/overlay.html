<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TV OS Overlay</title>
  <style>
    :root {
      --bg-glass: rgba(15, 17, 26, 0.74);
      --bg-glass-strong: rgba(11, 12, 19, 0.90);
      --border-soft: rgba(255, 255, 255, 0.09);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text-primary: #F5F6FA;
      --text-secondary: rgba(245, 246, 250, 0.58);
      --accent: #4C8DFF;
      --accent-2: #7C6CFF;
      --accent-soft: rgba(76, 141, 255, 0.16);
      --danger: #FF6B54;
      --danger-soft: rgba(255, 107, 84, 0.16);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
      --shadow-deep: 0 30px 90px rgba(0, 0, 0, 0.55), 0 8px 24px rgba(0, 0, 0, 0.35);
      --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in: cubic-bezier(0.4, 0, 1, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      font-family: 'SF Pro Display', Inter, system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    * { box-sizing: border-box; }

    svg.icon { width: 100%; height: 100%; display: block; }

    /* ---------- shared surface ---------- */

    .backdrop {
      position: absolute;
      inset: 0;
      background: radial-gradient(120% 120% at 50% 40%, rgba(20, 22, 34, 0.55), rgba(0, 0, 0, 0.62));
      backdrop-filter: blur(28px) saturate(1.15);
      -webkit-backdrop-filter: blur(28px) saturate(1.15);
      opacity: 0;
      animation: backdropIn 0.38s var(--ease-spring) forwards;
    }
    .ov-modal.leaving .backdrop { animation: backdropOut 0.24s var(--ease-in) forwards; }

    .glass {
      position: relative;
      background: linear-gradient(180deg, var(--bg-glass) 0%, var(--bg-glass-strong) 100%);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-deep), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(30px) saturate(1.3);
      -webkit-backdrop-filter: blur(30px) saturate(1.3);
      overflow: hidden;
      pointer-events: auto;
    }
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.07), transparent 45%);
      pointer-events: none;
    }

    .ambient-glow {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
      animation: ambientDrift 7s ease-in-out infinite alternate;
    }
    .ambient-glow--accent { background: var(--accent); }
    .ambient-glow--danger { background: var(--danger); }

    /* ---------- POWER MODAL ---------- */

    .ov-modal {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .power-card {
      width: 460px;
      max-width: calc(100vw - 48px);
      padding: 40px 36px 32px;
      text-align: center;
      opacity: 0;
      transform: scale(0.9) translateY(10px);
      filter: blur(6px);
      animation: cardIn 0.46s var(--ease-spring) forwards;
      animation-delay: 0.04s;
    }
    .ov-modal.leaving .power-card { animation: cardOut 0.24s var(--ease-in) forwards; }

    .power-ring {
      position: relative;
      width: 76px;
      height: 76px;
      margin: 0 auto 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, rgba(76, 141, 255, 0.16), transparent 70%);
      border: 1px solid rgba(76, 141, 255, 0.35);
      color: var(--accent);
      animation: ringPulse 2.4s ease-in-out infinite;
    }
    .power-ring svg.icon { width: 30px; height: 30px; }

    .power-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .power-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .power-sub {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .power-actions {
      display: flex;
      gap: 10px;
    }

    .power-btn {
      flex: 1;
      position: relative;
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 15px 12px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      font-size: 14.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.18s var(--ease-spring), background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .power-btn:hover { background: rgba(255, 255, 255, 0.08); }
    .power-btn--danger { background: var(--danger-soft); color: #FFD9CF; }
    .power-btn--danger:hover { background: rgba(255, 107, 84, 0.24); }

    .power-btn--focus {
      transform: translateY(-2px) scale(1.03);
      border-color: var(--border-strong);
      box-shadow: 0 0 0 2px var(--accent-soft), 0 10px 24px rgba(76, 141, 255, 0.18);
    }
    .power-btn--danger.power-btn--focus {
      box-shadow: 0 0 0 2px rgba(255, 107, 84, 0.35), 0 10px 24px rgba(255, 107, 84, 0.22);
    }

    /* ---------- BOTTOM HUD (volume / mute) ---------- */

    .ov-hud {
      position: absolute;
      left: 50%;
      bottom: 64px;
      transform: translateX(-50%);
    }

    .hud-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 30px;
      min-width: 360px;
      opacity: 0;
      transform: translateY(22px) scale(0.96);
      animation: hudIn 0.4s var(--ease-spring) forwards;
    }
    .ov-hud.leaving .hud-card { animation: hudOut 0.24s var(--ease-in) forwards; }

    .hud-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      color: var(--accent);
      animation: iconPop 0.4s var(--ease-spring);
    }
    .hud-icon--muted { background: var(--danger-soft); color: var(--danger); }
    .hud-icon svg.icon { width: 22px; height: 22px; }

    .hud-body { flex: 1; min-width: 0; }

    .hud-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .hud-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .hud-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    .segments {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
    }
    .segment {
      flex: 1;
      height: 100%;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.10);
      transform: scaleY(0.35);
      transform-origin: bottom;
      opacity: 0.5;
      animation: segGrow 0.36s var(--ease-spring) both;
    }
    .segment.filled {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      opacity: 1;
      box-shadow: 0 0 10px rgba(76, 141, 255, 0.45);
    }
    .segment.muted-fill {
      background: linear-gradient(180deg, #FF8A72, var(--danger));
      opacity: 0.9;
      box-shadow: 0 0 10px rgba(255, 107, 84, 0.4);
    }

    .hud-status {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ---------- TOAST (notifications / bluetooth / generic) ---------- */

    .ov-toast {
      position: absolute;
      top: 40px;
      right: 40px;
    }

    .toast-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      width: 380px;
      max-width: calc(100vw - 80px);
      padding: 18px 20px;
      opacity: 0;
      transform: translateX(48px);
      animation: toastIn 0.4s var(--ease-spring) forwards;
    }
    .ov-toast.leaving .toast-card { animation: toastOut 0.22s var(--ease-in) forwards; }

    .toast-icon {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .toast-icon svg.icon { width: 19px; height: 19px; }

    .toast-body { flex: 1; min-width: 0; }
    .toast-title {
      font-size: 13.5px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .toast-message {
      font-size: 13px;
      line-height: 1.4;
      color: var(--text-secondary);
    }

    .toast-timer {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 3px;
      width: 100%;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      transform-origin: left;
      animation-name: countdown;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
    }

    /* ---------- keyframes ---------- */

    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes backdropOut { from { opacity: 1; } to { opacity: 0; } }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.9) translateY(10px); filter: blur(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }
    @keyframes cardOut {
      from { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
      to   { opacity: 0; transform: scale(0.94) translateY(6px); filter: blur(3px); }
    }

    @keyframes hudIn {
      from { opacity: 0; transform: translateY(22px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes hudOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(16px) scale(0.97); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(48px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(32px); }
    }

    @keyframes segGrow {
      from { transform: scaleY(0.25); opacity: 0.3; }
      to   { transform: scaleY(1); opacity: 1; }
    }

    @keyframes iconPop {
      0%   { transform: scale(0.6); opacity: 0; }
      60%  { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(76, 141, 255, 0.28); }
      50%      { box-shadow: 0 0 0 10px rgba(76, 141, 255, 0); }
    }

    @keyframes ambientDrift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(20px, -14px) scale(1.15); }
    }

    @keyframes countdown {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001s !important;
        transition-duration: 0.001s !important;
      }
    }
  </style>
</head>
<body>
  <div id="overlay-root"></div>
  <script>
    const root = document.getElementById("overlay-root");
    let hideTimer = null;
    let activeType = null;
    let activePowerIndex = 1;
    let powerKeyHandler = null;
    let currentVolumeValue = 0;
    let currentMutedState = false;

    const POWER_BUTTONS = [
      { label: "Cancel", action: "cancel" },
      { label: "Yes, Power Off", action: "power-off", danger: true },
    ];

    const ICONS = {
      power: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v8"/><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/></svg>',
      volume: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 6a9 9 0 0 1 0 12" opacity="0.5"/></svg>',
      mute: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M23 9l-6 6"/><path d="M17 9l6 6"/></svg>',
      bluetooth: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7l10 10-5 5V2l5 5L7 17"/></svg>',
      bell: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>',
      info: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01"/><path d="M11 12h1v5h1"/></svg>',
    };

    function clearHideTimer() {
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = null;
    }

    function scheduleHide(ms) {
      clearHideTimer();
      if (!ms) return;
      hideTimer = setTimeout(hide, ms);
    }

    function hide() {
      clearHideTimer();
      if (powerKeyHandler) {
        document.removeEventListener("keydown", powerKeyHandler, true);
        powerKeyHandler = null;
      }
      activeType = null;
      const target = root.querySelector(".ov-modal, .ov-hud, .ov-toast");
      if (!target) { root.innerHTML = ""; return; }
      target.classList.add("leaving");
      const finish = () => { root.innerHTML = ""; };
      target.addEventListener("animationend", finish, { once: true });
      setTimeout(finish, 420);
    }

    function ambientGlow(variant, top, left) {
      const el = document.createElement("div");
      el.className = `ambient-glow ambient-glow--${variant}`;
      el.style.top = top;
      el.style.left = left;
      return el;
    }

    /* ---------- POWER ---------- */

    function renderPower() {
      root.innerHTML = "";
      activeType = "power";
      activePowerIndex = 1;

      const wrap = document.createElement("div");
      wrap.className = "ov-modal";

      const backdrop = document.createElement("div");
      backdrop.className = "backdrop";

      const card = document.createElement("div");
      card.className = "glass power-card";
      card.appendChild(ambientGlow("accent", "-40px", "-40px"));

      const ring = document.createElement("div");
      ring.className = "power-ring";
      ring.innerHTML = ICONS.power;

      const eyebrow = document.createElement("div");
      eyebrow.className = "power-eyebrow";
      eyebrow.textContent = "Power";

      const title = document.createElement("div");
      title.className = "power-title";
      title.textContent = "Turn off TV?";

      const sub = document.createElement("div");
      sub.className = "power-sub";
      sub.textContent = "The TV will shut down completely. You can turn it back on anytime.";

      const actions = document.createElement("div");
      actions.className = "power-actions";

      const buttons = POWER_BUTTONS.map((item) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `power-btn ${item.danger ? "power-btn--danger" : ""}`.trim();
        btn.textContent = item.label;
        btn.addEventListener("click", () => {
          if (item.action === "cancel") { hide(); return; }
          window.electronAPI.systemAction(item.action);
        });
        actions.appendChild(btn);
        return btn;
      });

      const focus = () => {
        buttons.forEach((btn, idx) => btn.classList.toggle("power-btn--focus", idx === activePowerIndex));
        buttons[activePowerIndex]?.focus();
      };

      powerKeyHandler = (event) => {
        if (activeType !== "power") return;
        if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
          event.preventDefault(); event.stopPropagation();
          activePowerIndex = (activePowerIndex - 1 + buttons.length) % buttons.length;
          focus();
        } else if (event.key === "ArrowRight" || event.key === "ArrowDown") {
          event.preventDefault(); event.stopPropagation();
          activePowerIndex = (activePowerIndex + 1) % buttons.length;
          focus();
        } else if (event.key === "Enter") {
          event.preventDefault(); event.stopPropagation();
          const item = POWER_BUTTONS[activePowerIndex];
          if (!item || item.action === "cancel") hide();
          else window.electronAPI.systemAction(item.action);
        } else if (event.key === "Escape" || event.key === "Backspace" || event.key === "BrowserBack") {
          event.preventDefault(); event.stopPropagation();
          hide();
        }
      };
      document.addEventListener("keydown", powerKeyHandler, true);

      card.appendChild(ring);
      card.appendChild(eyebrow);
      card.appendChild(title);
      card.appendChild(sub);
      card.appendChild(actions);
      wrap.appendChild(backdrop);
      wrap.appendChild(card);
      root.appendChild(wrap);

      setTimeout(focus, 60);
      scheduleHide(10000);
    }

    function handleRemotePower(command) {
      if (activeType !== "power") return false;

      const buttons = Array.from(root.querySelectorAll(".power-btn"));
      if (!buttons.length) return false;

      const focusAt = (index) => {
        activePowerIndex = ((index % buttons.length) + buttons.length) % buttons.length;
        buttons.forEach((btn, idx) => {
          btn.classList.toggle("power-btn--focus", idx === activePowerIndex);
        });
        buttons[activePowerIndex]?.focus({ preventScroll: true });
      };

      if (command === "LEFT" || command === "UP") {
        focusAt(activePowerIndex - 1);
        return true;
      }

      if (command === "RIGHT" || command === "DOWN") {
        focusAt(activePowerIndex + 1);
        return true;
      }

      if (command === "ENTER") {
        const item = POWER_BUTTONS[activePowerIndex];
        if (!item || item.action === "cancel") {
          hide();
        } else {
          window.electronAPI.systemAction(item.action);
        }
        return true;
      }

      if (command === "BACK") {
        hide();
        return true;
      }

      return false;
    }

    /* ---------- VOLUME / MUTE HUD ---------- */

    function buildSegments(count, filledCount, filledClass) {
      const bar = document.createElement("div");
      bar.className = "segments";
      for (let i = 0; i < count; i++) {
        const seg = document.createElement("div");
        seg.className = "segment" + (i < filledCount ? ` ${filledClass}` : "");
        seg.style.animationDelay = `${i * 12}ms`;
        bar.appendChild(seg);
      }
      return bar;
    }

    function createHudShell() {
      const wrap = document.createElement("div");
      wrap.className = "ov-hud";

      const card = document.createElement("div");
      card.className = "glass hud-card";

      const icon = document.createElement("div");
      icon.className = "hud-icon";

      const bodyEl = document.createElement("div");
      bodyEl.className = "hud-body";

      const row = document.createElement("div");
      row.className = "hud-row";
      const label = document.createElement("div");
      label.className = "hud-label";
      const value = document.createElement("div");
      value.className = "hud-value";
      row.appendChild(label);
      row.appendChild(value);

      const status = document.createElement("div");
      status.className = "hud-status";

      const spacer = document.createElement("div");
      spacer.style.height = "8px";

      const segmentsWrap = document.createElement("div");
      segmentsWrap.className = "hud-segments";

      bodyEl.appendChild(row);
      bodyEl.appendChild(status);
      bodyEl.appendChild(spacer);
      bodyEl.appendChild(segmentsWrap);

      card.appendChild(icon);
      card.appendChild(bodyEl);
      wrap.appendChild(card);
      root.innerHTML = "";
      root.appendChild(wrap);

      return {
        wrap,
        card,
        icon,
        label,
        value,
        status,
        segmentsWrap,
      };
    }

    function fillVolumeSegments(container, volume, muted) {
      container.innerHTML = "";
      const segCount = 24;
      const filled = Math.round((Math.max(0, Math.min(100, volume)) / 100) * segCount);
      container.appendChild(buildSegments(segCount, muted ? 0 : filled, muted ? "muted-fill" : "filled"));
    }

    function updateVolumeHud(volume, muted, options = {}) {
      const value = Math.max(0, Math.min(100, Number(volume) || 0));
      currentVolumeValue = value;
      currentMutedState = Boolean(muted);

      const existing = root.querySelector(".ov-hud");
      const shell = existing ? {
        wrap: existing,
        icon: existing.querySelector(".hud-icon"),
        label: existing.querySelector(".hud-label"),
        value: existing.querySelector(".hud-value"),
        status: existing.querySelector(".hud-status"),
        segmentsWrap: existing.querySelector(".hud-segments"),
      } : createHudShell();

      const mutedNow = Boolean(muted);
      shell.icon.className = "hud-icon" + (mutedNow ? " hud-icon--muted" : "");
      shell.icon.innerHTML = mutedNow ? ICONS.mute : ICONS.volume;
      shell.label.textContent = "Volume";
      shell.value.textContent = mutedNow ? "Muted" : `${value}%`;
      shell.status.textContent = mutedNow
        ? (value > 0 ? `Muted · ${value}% saved` : "Muted")
        : "Unmuted";
      fillVolumeSegments(shell.segmentsWrap, mutedNow ? 0 : value, mutedNow);

      if (options.animate) {
        shell.card.style.animation = "none";
        shell.card.offsetHeight;
        shell.card.style.animation = "";
      }

      return shell;
    }

    function renderVolume(volume) {
      activeType = "volume";
      updateVolumeHud(volume, false, { animate: true });
      scheduleHide(1600);
    }

    function renderMute(muted, volume = null) {
      activeType = "mute";
      if (volume !== null && volume !== undefined && !Number.isNaN(Number(volume))) {
        currentVolumeValue = Math.max(0, Math.min(100, Number(volume)));
      }
      updateVolumeHud(currentVolumeValue, muted, { animate: true });
      scheduleHide(1400);
    }

    /* ---------- TOAST ---------- */

    function renderSimple(payload) {
      root.innerHTML = "";
      activeType = payload.type;

      const duration = payload.type === "bluetooth-connected" ? 2200 : 1800;

      const wrap = document.createElement("div");
      wrap.className = "ov-toast";

      const card = document.createElement("div");
      card.className = "glass toast-card";

      const iconKey = payload.type && payload.type.startsWith("bluetooth")
        ? "bluetooth"
        : payload.type === "notification" ? "bell" : "info";

      const icon = document.createElement("div");
      icon.className = "toast-icon";
      icon.innerHTML = ICONS[iconKey];

      const bodyEl = document.createElement("div");
      bodyEl.className = "toast-body";

      const title = document.createElement("div");
      title.className = "toast-title";
      title.textContent = payload.title || (payload.type === "notification" ? "Notification" : "Status");

      const message = document.createElement("div");
      message.className = "toast-message";
      message.textContent = payload.message || payload.deviceName || "Status updated.";

      bodyEl.appendChild(title);
      bodyEl.appendChild(message);

      const timer = document.createElement("div");
      timer.className = "toast-timer";
      timer.style.animationDuration = `${duration}ms`;

      card.appendChild(icon);
      card.appendChild(bodyEl);
      card.appendChild(timer);
      wrap.appendChild(card);
      root.appendChild(wrap);
      scheduleHide(duration);
    }

    window.__overlay = {
      show(payload) {
      if (!payload) return hide();
      if (payload.type === "power") return renderPower();
      if (payload.type === "volume") return renderVolume(payload.volume);
        if (payload.type === "mute") return renderMute(payload.muted, payload.volume);
        return renderSimple(payload);
      },
      remote(command) {
        return handleRemotePower(command);
      },
      hide,
    };
  </script>
</body>
</html>
